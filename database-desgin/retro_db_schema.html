
<style>
#erd { padding: 8px 0; }
#erd svg { max-width: 100%; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.4; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a30' : '#f5ead0',
    primaryBorderColor: dark ? '#3a3a40' : '#ddd0b8',
    attributeBackgroundColorEven: dark ? '#1f1f25' : '#fdf6e8',
    attributeBackgroundColorOdd: dark ? '#18181c' : '#ffffff',
  },
});

const diagram = `erDiagram
  rooms ||--o{ participants : "has"
  rooms ||--o{ board_columns : "has"
  rooms ||--o{ note_groups : "has"
  rooms ||--o{ action_items : "has"
  rooms ||--o{ notes : "has"
  board_columns ||--o{ notes : "contains"
  board_columns ||--o{ note_groups : "groups in"
  participants ||--o{ notes : "writes"
  note_groups ||--o{ notes : "groups"

  rooms {
    uuid id PK
    varchar room_code UK
    varchar state
    int timer_seconds
    timestamp timer_started_at
    timestamp created_at
  }

  participants {
    uuid id PK
    uuid room_id FK
    varchar username
    varchar color
    varchar role
    varchar session_token
    timestamp joined_at
  }

  board_columns {
    uuid id PK
    uuid room_id FK
    varchar title
    varchar color
    int position
    timestamp created_at
  }

  notes {
    uuid id PK
    uuid room_id FK
    uuid column_id FK
    uuid participant_id FK
    uuid group_id FK
    text content
    int position
    timestamp created_at
    timestamp updated_at
  }

  note_groups {
    uuid id PK
    uuid room_id FK
    uuid column_id FK
    varchar name
    int position
    timestamp created_at
  }

  action_items {
    uuid id PK
    uuid room_id FK
    text content
    int position
    timestamp created_at
  }
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
