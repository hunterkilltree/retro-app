spring:
  application:
    name: retro-server

  datasource:
    url: jdbc:postgresql://localhost:5432/retrodb
    username: ${POSTGRES_USER:retro}
    password: ${POSTGRES_PASSWORD:retro_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

