services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: retro-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retrodb}
      POSTGRES_USER: ${POSTGRES_USER:-retro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retro_secret}
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Spring Boot) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./retro-server
      dockerfile: Dockerfile
    container_name: retro-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-retrodb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-retro}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-retro_secret}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./retro-fe
      dockerfile: Dockerfile
      args:
        # Points server-side API routes at the backend container
        BACKEND_URL: http://backend:8080
    container_name: retro-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
