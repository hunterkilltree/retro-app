name: Build & Push Docker Images

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Enables multi-platform builds and advanced caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./retro-server
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/retro-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/retro-backend:${{ github.sha }}
          # Cache layers between runs so Gradle deps aren't re-downloaded every time
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./retro-fe
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/retro-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/retro-frontend:${{ github.sha }}
          build-args: |
            BACKEND_URL=${{ secrets.BACKEND_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
